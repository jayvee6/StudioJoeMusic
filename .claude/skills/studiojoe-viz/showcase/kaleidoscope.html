<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Kaleidoscope Tunnel — studiojoe-viz showcase</title>
<style>
html, body { margin: 0; height: 100%; background: #000; overflow: hidden; font-family: -apple-system, system-ui, sans-serif; }
canvas { display: block; width: 100vw; height: 100vh; }
.nav { position: fixed; top: 16px; left: 16px; z-index: 10; display: flex; gap: 10px; }
.nav a { color: #f2f2f7; text-decoration: none; font-size: 12px; background: rgba(0,0,0,0.5); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); padding: 8px 14px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); }
.nav a:hover { background: rgba(0,0,0,0.7); }
.title { position: fixed; bottom: 20px; left: 20px; z-index: 10; color: #f2f2f7; }
.title h1 { font-size: 14px; font-weight: 600; margin: 0 0 4px; }
.title p { font-size: 11px; color: #8a8a99; margin: 0; font-family: "SF Mono", ui-monospace, monospace; }
</style>
</head>
<body>
<div class="nav"><a href="index.html">← showcase</a></div>
<div class="title">
  <h1>Kaleidoscope Tunnel</h1>
  <p>6-fold polar fold · depth accumulator · HSL palette · gem flares</p>
</div>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script>
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

const VS = `
varying vec2 vUv;
void main() { vUv = uv; gl_Position = vec4(position, 1.0); }
`;

const FS = `
precision highp float;
varying vec2 vUv;

uniform float u_camZ;
uniform float u_hue;
uniform float u_twist;
uniform float u_bass;
uniform float u_mid;
uniform float u_treble;
uniform vec2  u_resolution;

const float PI = 3.14159265359;

vec3 hsl2rgb(float h, float s, float l) {
  vec3 rgb = clamp(abs(mod(h * 6.0 + vec3(0.0, 4.0, 2.0), 6.0) - 3.0) - 1.0, 0.0, 1.0);
  float c = (1.0 - abs(2.0 * l - 1.0)) * s;
  return vec3(l) + c * (rgb - 0.5);
}

void main() {
  float asp = u_resolution.x / u_resolution.y;
  vec2 p = (vUv - 0.5) * vec2(asp, 1.0);
  float r = length(p);
  if (r < 0.002) { gl_FragColor = vec4(0.0, 0.0, 0.0, 1.0); return; }

  float a = atan(p.y, p.x);

  // Tunnel coord — 1/r maps centre to infinite depth, camZ advances forward
  float depth   = 1.0 / r;
  float tunnelV = depth + u_camZ;

  // 6-fold fold with mid-freq twist that grows with depth
  const float K = 6.0;
  const float sector = (2.0 * PI) / K;
  float twistedA = a + u_twist * (depth * 0.04);
  float fa = mod(twistedA + 2.0 * PI * 4.0, sector);
  float mirroredA = (fa > sector * 0.5) ? (sector - fa) : fa;
  float tunnelU = mirroredA / (sector * 0.5);

  // Ring pattern — bright bands every 2 depth units, sharpened by cube
  float ringPhase  = fract(tunnelV * 0.5) * 2.0 * PI;
  float ringBright = 0.5 + 0.5 * cos(ringPhase);
  ringBright = ringBright * ringBright * ringBright;

  float ring2Phase  = fract(tunnelV * 1.5 + 0.25) * 2.0 * PI;
  float ring2Bright = max(0.0, 0.5 + 0.5 * cos(ring2Phase));
  ring2Bright *= ring2Bright;

  // Spoke Gaussians along the mirror plane + sector mid-line
  float spokeMirror = exp(-tunnelU * tunnelU * 14.0);
  float spokeMiddle = exp(-(1.0 - tunnelU) * (1.0 - tunnelU) * 14.0) * 0.55;
  float spokeBright = spokeMirror + spokeMiddle;
  float gemBright   = spokeBright * ringBright;

  // Colour: hue cycles with time + depth + sector angle + bass
  float hue = u_hue + tunnelV * 0.10 + tunnelU * 0.55 + u_bass * 0.12;
  float sat = 0.88 + u_bass * 0.12;
  float lum = 0.12 + ringBright * 0.22 + ring2Bright * 0.08 + spokeBright * 0.18;
  lum *= (0.70 + u_mid * 0.60);
  lum = min(lum, 0.85);

  vec3 col = hsl2rgb(fract(hue), sat, lum);

  // Hot gem flare at ring/spoke intersections
  col += gemBright * vec3(0.90, 0.95, 1.00) * 0.75 * (0.6 + u_treble * 0.6);

  // Central fog + edge vignette
  float centerFade = smoothstep(0.0, 0.06, r);
  col *= centerFade;
  float vignette = 1.0 - smoothstep(0.42, 0.52, r / max(asp, 1.0 / asp));
  col *= vignette;

  gl_FragColor = vec4(clamp(col, 0.0, 1.0), 1.0);
}
`;

const mat = new THREE.ShaderMaterial({
  uniforms: {
    u_camZ:       { value: 0 },
    u_hue:        { value: 0 },
    u_twist:      { value: 0 },
    u_bass:       { value: 0 },
    u_mid:        { value: 0 },
    u_treble:     { value: 0 },
    u_resolution: { value: new THREE.Vector2(innerWidth, innerHeight) },
  },
  vertexShader: VS,
  fragmentShader: FS,
});
scene.add(new THREE.Mesh(new THREE.PlaneGeometry(2, 2), mat));

function fakeFrame(t) {
  return {
    bass:   (Math.sin(t * 0.5) + 1) * 0.5,
    mid:    (Math.sin(t * 1.1) + 1) * 0.5,
    treble: (Math.sin(t * 1.9) + 1) * 0.5,
  };
}

let camZ = 0, hue = 0, twist = 0, lastT = 0;
const start = performance.now();
function loop() {
  const t = (performance.now() - start) / 1000;
  const dt = Math.min(0.1, t - lastT);
  lastT = t;

  const f = fakeFrame(t);

  // CPU accumulators — frame-rate-independent via dt
  camZ  += dt * (0.4 + f.bass * 2.0);
  hue   += dt * 0.05;
  twist += dt * f.mid * 0.3;

  const u = mat.uniforms;
  u.u_camZ.value   = camZ;
  u.u_hue.value    = hue;
  u.u_twist.value  = twist;
  u.u_bass.value   = f.bass;
  u.u_mid.value    = f.mid;
  u.u_treble.value = f.treble;
  u.u_resolution.value.set(innerWidth, innerHeight);

  renderer.render(scene, camera);
  requestAnimationFrame(loop);
}
addEventListener('resize', () => {
  renderer.setSize(innerWidth, innerHeight);
});
loop();
</script>
</body>
</html>
