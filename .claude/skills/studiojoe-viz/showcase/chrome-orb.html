<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Chrome Orb — studiojoe-viz showcase</title>
<style>
html, body { margin: 0; height: 100%; background: #000; overflow: hidden; font-family: -apple-system, system-ui, sans-serif; }
canvas { display: block; width: 100vw; height: 100vh; }
.nav { position: fixed; top: 16px; left: 16px; z-index: 10; display: flex; gap: 10px; }
.nav a { color: #f2f2f7; text-decoration: none; font-size: 12px; background: rgba(0,0,0,0.5); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); padding: 8px 14px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); }
.nav a:hover { background: rgba(0,0,0,0.7); }
.title { position: fixed; bottom: 20px; left: 20px; z-index: 10; color: #f2f2f7; }
.title h1 { font-size: 14px; font-weight: 600; margin: 0 0 4px; }
.title p { font-size: 11px; color: #8a8a99; margin: 0; font-family: "SF Mono", ui-monospace, monospace; }
</style>
</head>
<body>
<div class="nav"><a href="index.html">← showcase</a></div>
<div class="title">
  <h1>Chrome Orb</h1>
  <p>CubeCamera real reflections · nebula skybox · PBR disco tiles</p>
</div>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
<script>
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.physicallyCorrectLights = true;
renderer.toneMapping             = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure     = 1.05;
renderer.outputEncoding          = THREE.sRGBEncoding;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.1, 600);
camera.position.set(0, 0, 5);

// ---------- Nebula skybox ----------
// Physical space is mostly black, which makes a chrome ball in space read as
// mostly black too. Fake it with a gradient sky + procedural nebula shader
// so every reflection direction sees SOMETHING — dim indigo floors, warm
// magenta ceilings, cyan/purple nebula clouds between. Inside-out sphere.
const skyMat = new THREE.ShaderMaterial({
  uniforms: {
    u_time: { value: 0 },
  },
  vertexShader: `
    varying vec3 vDir;
    void main() {
      vDir = normalize(position);
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    precision highp float;
    uniform float u_time;
    varying vec3 vDir;

    float hash(vec3 p) {
      p = fract(p * 0.3183099 + 0.1);
      p *= 17.0;
      return fract(p.x * p.y * p.z * (p.x + p.y + p.z));
    }
    float noise3(vec3 p) {
      vec3 i = floor(p);
      vec3 f = fract(p);
      f = f*f*(3.0 - 2.0*f);
      return mix(mix(mix(hash(i + vec3(0,0,0)), hash(i + vec3(1,0,0)), f.x),
                     mix(hash(i + vec3(0,1,0)), hash(i + vec3(1,1,0)), f.x), f.y),
                 mix(mix(hash(i + vec3(0,0,1)), hash(i + vec3(1,0,1)), f.x),
                     mix(hash(i + vec3(0,1,1)), hash(i + vec3(1,1,1)), f.x), f.y), f.z);
    }
    float fbm(vec3 p) {
      float v = 0.0, a = 0.5;
      for (int i = 0; i < 5; i++) {
        v += a * noise3(p);
        p = p * 2.0 + vec3(3.1, 1.7, 2.3);
        a *= 0.5;
      }
      return v;
    }

    void main() {
      vec3 d = normalize(vDir);

      // Base vertical gradient — purple/indigo bottom to warm magenta top
      float y01 = d.y * 0.5 + 0.5;
      vec3 bottom = vec3(0.015, 0.010, 0.040);
      vec3 mid    = vec3(0.050, 0.025, 0.090);
      vec3 top    = vec3(0.090, 0.030, 0.120);
      vec3 col = mix(bottom, mid, smoothstep(0.0, 0.55, y01));
      col      = mix(col, top, smoothstep(0.50, 1.0, y01));

      // Procedural nebula clouds — fbm twice, coloured
      float n1 = fbm(d * 1.8 + vec3(u_time * 0.005, 0.0, 0.0));
      float n2 = fbm(d * 3.4 + vec3(0.0, u_time * 0.004, 0.0));
      vec3 nebulaA = vec3(0.55, 0.18, 0.95) * pow(n1, 2.0) * 0.85;   // magenta
      vec3 nebulaB = vec3(0.18, 0.48, 0.95) * pow(n2, 2.0) * 0.55;   // blue
      col += nebulaA + nebulaB;

      // Hot pocket of orange/pink near the horizon
      float pocket = smoothstep(0.35, 0.55, n1) * smoothstep(0.3, 0.7, y01) * 0.3;
      col += vec3(1.0, 0.5, 0.3) * pocket;

      gl_FragColor = vec4(col, 1.0);
    }
  `,
  side: THREE.BackSide,
  depthWrite: false,
  toneMapped: false,
});
const sky = new THREE.Mesh(new THREE.SphereGeometry(250, 48, 32), skyMat);
scene.add(sky);

// ---------- Starfield ----------
const starCount = 3500;
const starGeo = new THREE.BufferGeometry();
const starPos = new Float32Array(starCount * 3);
const starCol = new Float32Array(starCount * 3);
for (let i = 0; i < starCount; i++) {
  const phi = Math.random() * Math.PI * 2;
  const ct  = Math.random() * 2 - 1;
  const st  = Math.sqrt(1 - ct * ct);
  const r   = 100 + Math.random() * 60;
  starPos[i * 3 + 0] = r * st * Math.cos(phi);
  starPos[i * 3 + 1] = r * ct;
  starPos[i * 3 + 2] = r * st * Math.sin(phi);
  const temp = Math.random();
  const brightness = 0.6 + Math.random() * 0.7;
  starCol[i * 3 + 0] = (0.85 + temp * 0.35) * brightness;
  starCol[i * 3 + 1] = (0.90 + Math.random() * 0.15) * brightness;
  starCol[i * 3 + 2] = (0.95 + (1 - temp) * 0.25) * brightness;
}
starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
starGeo.setAttribute('color',    new THREE.BufferAttribute(starCol, 3));
const stars = new THREE.Points(starGeo, new THREE.PointsMaterial({
  size: 0.5, vertexColors: true, sizeAttenuation: true,
  toneMapped: false, transparent: true, opacity: 1.0,
}));
scene.add(stars);

// ---------- Orbiting coloured accent lights ----------
const orbitLights = [];
[
  { col: new THREE.Color(1.0, 0.30, 0.60), phase: 0 },
  { col: new THREE.Color(0.30, 0.60, 1.0), phase: Math.PI * 0.5 },
  { col: new THREE.Color(1.0, 0.70, 0.25), phase: Math.PI },
  { col: new THREE.Color(0.30, 1.0, 0.70), phase: Math.PI * 1.5 },
].forEach((def) => {
  const mesh = new THREE.Mesh(
    new THREE.SphereGeometry(0.16, 18, 12),
    new THREE.MeshBasicMaterial({
      color: def.col.clone().multiplyScalar(2.0), toneMapped: false,
    })
  );
  scene.add(mesh);
  const light = new THREE.PointLight(def.col, 20, 15, 2);
  scene.add(light);
  orbitLights.push({ mesh, light, phase: def.phase, baseCol: def.col.clone() });
});

// Soft ambient fill — just enough so tiles that happen to face a dim area of
// the cubemap don't read as black. Physical disco balls rely heavily on
// ambient bounce — this fakes it.
scene.add(new THREE.AmbientLight(0x2a2038, 0.35));

// ---------- CubeCamera for real-time reflections ----------
// Higher resolution (512) so nebula shader + stars register crisply in tile
// reflections. The shader sky covers every direction so no tile is pure black.
const cubeRT = new THREE.WebGLCubeRenderTarget(512, {
  format: THREE.RGBAFormat,
  generateMipmaps: true,
  minFilter: THREE.LinearMipmapLinearFilter,
  encoding: THREE.sRGBEncoding,
});
const cubeCamera = new THREE.CubeCamera(0.1, 300, cubeRT);
scene.add(cubeCamera);

// ---------- Disco ball ----------
function buildDiscoBall(radius, nLat, nLonEq, gapFrac) {
  const positions = [], normals = [], indices = [];
  let vi = 0;
  for (let i = 0; i < nLat; i++) {
    const lat0 = (i / nLat) * Math.PI - Math.PI / 2;
    const lat1 = ((i + 1) / nLat) * Math.PI - Math.PI / 2;
    const latC = (lat0 + lat1) / 2;
    const latH = (lat1 - lat0) / 2 * (1 - gapFrac);
    const cosLat = Math.cos(latC);
    const nLon = Math.max(3, Math.round(nLonEq * cosLat));
    for (let j = 0; j < nLon; j++) {
      const lon0 = (j / nLon) * Math.PI * 2;
      const lon1 = ((j + 1) / nLon) * Math.PI * 2;
      const lonC = (lon0 + lon1) / 2;
      const lonH = (lon1 - lon0) / 2 * (1 - gapFrac);
      const nx = Math.cos(latC) * Math.cos(lonC);
      const ny = Math.sin(latC);
      const nz = Math.cos(latC) * Math.sin(lonC);
      const corners = [
        [latC - latH, lonC - lonH],
        [latC + latH, lonC - lonH],
        [latC + latH, lonC + lonH],
        [latC - latH, lonC + lonH],
      ];
      for (const [la, lo] of corners) {
        positions.push(
          Math.cos(la) * Math.cos(lo) * radius,
          Math.sin(la) * radius,
          Math.cos(la) * Math.sin(lo) * radius
        );
        normals.push(nx, ny, nz);
      }
      indices.push(vi, vi + 1, vi + 2, vi, vi + 2, vi + 3);
      vi += 4;
    }
  }
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
  g.setAttribute('normal',   new THREE.Float32BufferAttribute(normals, 3));
  g.setIndex(indices);
  return g;
}

// Denser grid — more tiles = more sparkle points. Small gap (4%) keeps the
// ball reading as one object rather than a loose grid.
const orbGeo = buildDiscoBall(1.2, 28, 56, 0.04);
const orbMat = new THREE.MeshPhysicalMaterial({
  color: 0xffffff,
  metalness: 1.0,
  roughness: 0.04,          // near-perfect mirror with a touch of haze
  envMap: cubeRT.texture,
  envMapIntensity: 1.15,
});
const orb = new THREE.Mesh(orbGeo, orbMat);
scene.add(orb);

// Dark backing sphere — visible through tile gaps as grout
const backing = new THREE.Mesh(
  new THREE.SphereGeometry(1.175, 48, 32),
  new THREE.MeshStandardMaterial({ color: 0x040408, metalness: 0.3, roughness: 0.95 })
);
orb.add(backing);

// ---------- Bloom ----------
const composer = new THREE.EffectComposer(renderer);
composer.addPass(new THREE.RenderPass(scene, camera));
const bloom = new THREE.UnrealBloomPass(
  new THREE.Vector2(innerWidth, innerHeight),
  0.6,   // strength
  0.8,   // radius
  0.75   // threshold — only true highlights bloom
);
composer.addPass(bloom);

// ---------- Audio + loop ----------
function fakeFrame(t) {
  return {
    bass:      (Math.sin(t * 0.5) + 1) * 0.5,
    treble:    (Math.sin(t * 1.9) + 1) * 0.5,
    beatPulse: Math.max(0, Math.sin(t * 2.0)) ** 4,
  };
}

const start = performance.now();
let lastT = 0;
function loop() {
  const t = (performance.now() - start) / 1000;
  const dt = Math.min(0.1, t - lastT);
  lastT = t;
  const f = fakeFrame(t);

  // Orb rotation
  orb.rotation.y += dt * (0.15 + f.bass * 0.50);
  orb.rotation.x += dt * 0.05;
  orb.scale.setScalar(1.0 + f.beatPulse * 0.035);

  // Orbit the coloured lights — slower base rate so specular highlights glide
  // across tiles rather than streak. Individual step keeps the lights drifting
  // out of phase with each other so they don't all line up.
  orbitLights.forEach((o, i) => {
    const ang = o.phase + t * (0.09 + i * 0.025);
    const r   = 3.6 + Math.sin(t * 0.25 + i) * 0.35;
    const y   = Math.sin(ang * 1.6) * 1.1;
    o.mesh.position.set(Math.cos(ang) * r, y, Math.sin(ang) * r);
    o.light.position.copy(o.mesh.position);
    o.light.intensity = 16 + f.bass * 30 + f.beatPulse * 24;
    o.mesh.material.color.copy(o.baseCol).multiplyScalar(1.8 + f.beatPulse * 1.5);
  });

  // Animate the sky shader + slow starfield parallax
  skyMat.uniforms.u_time.value = t;
  stars.rotation.y = t * 0.004;
  stars.rotation.x = Math.sin(t * 0.02) * 0.05;

  // Refresh the reflection cubemap — hide orb so it doesn't self-reflect
  orb.visible = false;
  cubeCamera.position.copy(orb.position);
  cubeCamera.update(renderer, scene);
  orb.visible = true;

  // Subtle beat-reactive bloom
  bloom.strength = 0.55 + f.beatPulse * 0.25;

  composer.render();
  requestAnimationFrame(loop);
}

addEventListener('resize', () => {
  renderer.setSize(innerWidth, innerHeight);
  composer.setSize(innerWidth, innerHeight);
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
});
loop();
</script>
</body>
</html>
